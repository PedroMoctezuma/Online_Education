<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Education</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-yellow: #f4c613; --dark-bg: #1a1a1a; }
        .bg-yellow { background-color: var(--main-yellow); }
        .text-yellow { color: var(--main-yellow); }
        .btn-main { background-color: var(--main-yellow); color: black; font-weight: bold; border-radius: 0; padding: 12px 30px; border: none; }
        .btn-main:hover { background-color: #d4ac0d; }
        .btn-outline-main { border: 2px solid var(--main-yellow); color: var(--main-yellow); background: transparent; border-radius: 0; padding: 8px 20px; font-weight: bold; text-decoration: none; display: inline-block; text-align: center; margin: 0 5px; }
        .btn-outline-main:hover { background-color: var(--main-yellow); color: black; }
        .login-card { border-radius: 0; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: rgba(26, 26, 26, 0.95); }
        .login-header { background: var(--dark-bg); padding: 30px; text-align: center; border-bottom: 3px solid var(--main-yellow); }
        .login-header h4 { margin: 0; font-weight: bold; letter-spacing: 1px; }
        .login-header p { margin: 10px 0 0; color: #aaa; font-size: 14px; }
        .login-body { padding: 40px; }
        .form-label { color: white; font-weight: bold; }
        .form-control { border-radius: 0; padding: 12px; border: 1px solid #444; background: #2a2a2a; color: white; }
        .form-control:focus { border-color: var(--main-yellow); box-shadow: none; background: #2a2a2a; color: white; }
        .form-control::placeholder { color: #888; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=2070') no-repeat center center/cover; min-height: 100vh; display: flex; align-items: center; }
        .nav-menu-btn { margin-left: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/"><span class="text-yellow">ONLINE</span> EDUCATION</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-uppercase align-items-center">
                    <li class="nav-item"><a class="btn btn-outline-main nav-menu-btn" href="/">Inicio</a></li>
                    <li class="nav-item"><a class="btn btn-outline-main nav-menu-btn" href="/login/">Iniciar Sesión</a></li>
                    <li class="nav-item"><a class="btn btn-outline-main nav-menu-btn" href="/#contacto">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="hero-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="login-card">
                        <div class="login-header">
                            <h4 class="text-yellow">BIENVENIDO</h4>
                            <p>Inicia sesión en tu cuenta</p>
                        </div>
                        <div class="login-body">
                            {% if error %}
                            <div class="alert alert-danger" style="border-radius: 0;">{{ error }}</div>
                            {% endif %}
                            <form method="POST">
                                {% csrf_token %}
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Correo Electrónico</label>
                                    <input type="email" name="email" class="form-control" placeholder="tucorreo@edu.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Contraseña</label>
                                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-main w-100 mt-3">INICIAR SESIÓN <i class="fas fa-arrow-right ms-2"></i></button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
